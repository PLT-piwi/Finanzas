name: Build Mis Finanzas (Windows)

on:
  push:
    branches: ['main', 'master']
  pull_request:
  workflow_dispatch:

jobs:
  build-win:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build

      - name: Build Windows installer (NSIS)
        env:
          CI: true
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx electron-builder --win --x64

      - name: List generated files
        shell: pwsh
        run: Get-ChildItem -Recurse release | Select-Object FullName, Length

      - name: Upload Mis Finanzas installer
        uses: actions/upload-artifact@v4
        with:
          name: mis-finanzas
          path: |
            release/Mis Finanzas Setup *.exe
            release/Mis Finanzas Setup *.blockmap
            release/*.exe
            release/*.blockmap
          if-no-files-found: error
